---
layout: default
navbar_class: row-light
---

<div class="container-fluid">

  <div class="row row-light pt-5 pb-5">
    <div class="container article-container">

      <div class="article-content">

        <h1 class="article-title">{{ page.title }}</h1>

        <p class="article-date">
          {{ page.date | date: "%-d %B %Y" }}
        </p>

        {% if page.hero_image %}
        <figure class="article-hero">
          <img src="{{ page.hero_image }}" alt="{{ page.title }}" class="img-fluid">
          {% if page.hero_caption %}
          <figcaption class="article-hero-caption">{{ page.hero_caption }}</figcaption>
          {% endif %}
        </figure>
        {% endif %}

        <div class="article-body">
          {{ content }}
        </div>

      </div>

    </div>
  </div>

</div>

<script>
  document.querySelectorAll('.article-body a').forEach(function(a) {
    a.setAttribute('target', '_blank');
    a.setAttribute('rel', 'noopener noreferrer');
  });
</script>
